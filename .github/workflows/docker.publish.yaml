name: CI and Publish Docker Image

on:
  pull_request:
  push:
    branches: ["main"]
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/csoesports/cso-valorant-mcp

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile source
        run: uv run python -m compileall -q src

      - name: Smoke test tool registry
        run: |
          uv run python - <<'PY'
          import asyncio
          import os
          from unittest.mock import patch

          from valorant_mcp_server import http_server
          from valorant_mcp_server.server import mcp

          async def main():
              tools = await mcp.list_tools()
              resources = await mcp.list_resources()
              assert tools, "No MCP tools registered"
              tool_names = {tool.name for tool in tools}
              resource_uris = {str(resource.uri) for resource in resources}
              required_tools = {
                  "get_rank",
                  "get_rank_history",
                  "get_match_details",
                  "get_live_status",
                  "get_static_content",
                  "get_player_activity_report",
                  "get_weekly_activity_report",
                  "get_role_profile",
                  "get_consistency_score",
                  "get_trial_readiness_score",
                  "compare_players",
              }
              assert required_tools <= tool_names, required_tools - tool_names
              assert "valorant://agents" in resource_uris
              print(f"Registered {len(tools)} MCP tools")

          asyncio.run(main())

          os.environ["MCP_HOST"] = "127.0.0.1"
          os.environ["MCP_PORT"] = "8123"
          with patch.object(http_server.mcp, "run") as run:
              http_server.main()
              run.assert_called_once_with(transport="streamable-http")
              assert http_server.mcp.settings.host == "127.0.0.1"
              assert http_server.mcp.settings.port == 8123
          PY

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: cso-valorant-mcp:ci

  publish:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
