name: Valorant MCP CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: valorant-mcp-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/csoesports/cso-valorant-mcp

jobs:
  build-test-image:
    name: Build, test, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Compile Python sources
        run: uv run python -m compileall src

      - name: Check package import
        run: |
          uv run python - <<'PY'
          import asyncio
          import valorant_mcp_server.server as server

          async def main():
              tools = await server.mcp.list_tools()
              names = {tool.name for tool in tools}
              required = {
                  "get_match_rounds_summary",
                  "get_match_round",
                  "get_match_events_compact",
                  "get_match_player_impact_summary",
                  "get_match_team_economy_summary",
                  "get_match_opening_duels",
                  "get_player_map_pool_last_n",
                  "get_player_agent_pool_last_n",
              }
              assert required <= names, required - names
              print("valorant_mcp_server import ok")

          asyncio.run(main())
          PY
        env:
          HENRIK_API_KEY: ci-placeholder

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build image for pull requests
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          tags: ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}

      - name: Build and publish image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
